level: 3
name: Measured
description: >
  Feedback becomes visible. The quality agent opens issues about testing
  infrastructure — coverage gaps, missing CI workflows, test result reporting.
  All other agents remain in advisory mode. CI-maintainer joins to monitor
  build health. The key L3 artifact is measurement infrastructure.
governor:
  modes: SURGE, BUSY, QUIET, IDLE
  merge_policy: manual
  eval_interval_s: 300
  thresholds:
    surge: 15
    busy: 10
    quiet: 3
    idle: 0
  cadences:
    surge:
      supervisor: 5m
      scanner: 4h
      ci-maintainer: 4h
      quality: 2h
      guide: 4h
    busy:
      supervisor: 5m
      scanner: 4h
      ci-maintainer: 4h
      quality: 2h
      guide: 4h
    quiet:
      supervisor: 5m
      scanner: 4h
      ci-maintainer: 4h
      quality: 2h
      guide: 4h
    idle:
      supervisor: 5m
      scanner: 4h
      ci-maintainer: 4h
      quality: 2h
      guide: 4h
agents:
  - name: supervisor
    display_name: Supervisor
    role: supervisor
    description: >
      Agent health monitoring, sweep analysis, and escalation. Watches all
      other agents for stalls, rate limits, and anomalies.
    emoji: "👑"
    color: "#e74c3c"
    sort_order: 1
    backend: copilot
    model: claude-sonnet-4-6
    bead_role: supervisor
    kick_template: supervisor-CLAUDE.md
    include_repos: true
    stale_timeout: 1800
    interactions: >
      Monitors all agents. Escalates issues to human operators. Coordinates
      agent restarts and health checks.
    knowledge_use: >
      Reads agent health history and operational patterns. Produces sweep
      reports and health assessments.
  - name: scanner
    display_name: scanner (advisory)
    role: scanner
    description: >
      Scans code for issues and suggests fixes, but does NOT create PRs or
      issues. Reports findings as beads for the advisory digest.
    emoji: "🔍"
    color: "#3498db"
    sort_order: 20
    backend: copilot
    model: claude-sonnet-4-6
    bead_role: worker
    kick_template: scanner-advisory-CLAUDE.md
    include_repos: true
    stale_timeout: 7200
    lane_keywords: [bug, triage, fix]
    interactions: "Produces advisory findings. No autonomous actions."
    knowledge_use: >
      Reads project patterns and known issues. Produces findings as advisory
      beads for the team to review.
  - name: ci-maintainer
    display_name: ci-maintainer (advisory)
    role: ci-maintainer
    description: >
      Monitors CI health, workflow status, and build trends. Reports findings
      as beads for the advisory digest. Does NOT create PRs or issues.
    emoji: "🔧"
    color: "#2ecc71"
    sort_order: 30
    backend: copilot
    model: claude-sonnet-4-6
    bead_role: worker
    kick_template: ci-maintainer-advisory-CLAUDE.md
    include_repos: true
    stale_timeout: 3600
    lane_keywords: [ci, build, pipeline, workflow]
    interactions: >
      Monitors CI alongside quality. Reports CI health as advisory beads.
    knowledge_use: >
      Reads CI patterns and past failures. Produces CI health advisory beads.
  - name: quality
    display_name: quality
    role: quality
    description: >
      Analyzes test coverage and opens GitHub issues about testing gaps,
      missing CI workflows, and test infrastructure. The ONE agent at L3
      that can create issues. Also produces advisory beads.
    emoji: "🧪"
    color: "#e67e22"
    sort_order: 25
    backend: copilot
    model: claude-opus-4-6
    bead_role: worker
    kick_template: quality-measured-CLAUDE.md
    include_repos: true
    stale_timeout: 3600
    interactions: >
      Opens issues about testing. Complements scanner and ci-maintainer
      advisory findings with actionable test recommendations.
    knowledge_use: >
      Reads test patterns, coverage rules, and known regressions from the
      knowledge base to prioritize which code needs tests most.
  - name: guide
    display_name: guide (advisory)
    role: guide
    description: >
      Audits project documentation and onboarding experience. Reports
      findings as beads for the advisory digest. Does NOT create PRs or issues.
    emoji: "🧭"
    color: "#8e44ad"
    sort_order: 10
    backend: copilot
    model: claude-sonnet-4-6
    bead_role: worker
    kick_template: guide-advisory-CLAUDE.md
    include_repos: true
    stale_timeout: 3600
    interactions: "Works alongside scanner. Reviews scanner's suggestions when asked."
    knowledge_use: >
      Reads community wiki and project patterns. Starts contributing review
      insights as knowledge entries.
