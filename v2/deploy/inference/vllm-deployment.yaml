---
apiVersion: v1
kind: Namespace
metadata:
  name: hive-inference
---
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: hive-inference
type: Opaque
stringData:
  token: "${HF_TOKEN}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: hive-inference
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - "--model"
            - "Qwen/Qwen2.5-1.5B-Instruct"
            - "--device"
            - "cpu"
            - "--dtype"
            - "float32"
            - "--max-model-len"
            - "2048"
            - "--trust-remote-code"
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
            limits:
              cpu: "8"
              memory: 16Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-svc
  namespace: hive-inference
  labels:
    app: vllm
spec:
  selector:
    app: vllm
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
