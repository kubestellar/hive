level: 1
name: Assisted
description: >
  Open-loop assistance. A single interactive advisor helps with repo setup,
  test stubs, and early architecture decisions. All actions require human
  approval. No feedback loops — the advisor responds to requests but does
  not monitor or act autonomously.
governor:
  modes: none
  merge_policy: manual
  eval_interval_s: 600
  cadences:
    quiet:
      guide: 2h
    idle:
      guide: 4h
agents:
  - name: guide
    display_name: guide
    role: guide
    description: >
      Interactive advisor that queries the community knowledge base for
      scaffolding patterns. Helps create repos, initial structure, and test
      stubs. No autonomous actions — everything is conversational.
    emoji: "🧭"
    color: "#8e44ad"
    sort_order: 10
    backend: copilot
    model: claude-sonnet-4-6
    bead_role: worker
    mode: ADVISORY
    kick_template: guide-advisory.md
    include_repos: false
    stale_timeout: 7200
    interactions: "Standalone. Responds to user queries only."
    knowledge_use: >
      Heavy consumer — reads community wiki, project patterns, and scaffolding
      templates. Does not produce knowledge entries at this level.
