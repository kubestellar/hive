name: Build and Push Docker Image

on:
  push:
    branches:
      - v2
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Platform slug
        id: slug
        run: echo "slug=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: v2/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/kubestellar/hive,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.slug.outputs.slug }}
          cache-to: type=gha,scope=${{ steps.slug.outputs.slug }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.slug.outputs.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract git metadata
        id: meta
        run: |
          echo "git_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/kubestellar/hive:v2-latest \
            -t ghcr.io/kubestellar/hive:${{ steps.meta.outputs.git_short }} \
            $(printf 'ghcr.io/kubestellar/hive@sha256:%s ' *)

  build-contributor:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Platform slug
        id: slug
        run: echo "slug=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Build and push contributor image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: v2/Dockerfile.contributor
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/kubestellar/hive-contributor,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=contributor-${{ steps.slug.outputs.slug }}
          cache-to: type=gha,scope=contributor-${{ steps.slug.outputs.slug }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/contrib-digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/contrib-digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: contrib-digests-${{ steps.slug.outputs.slug }}
          path: /tmp/contrib-digests/*
          if-no-files-found: error
          retention-days: 1

  merge-contributor:
    runs-on: ubuntu-latest
    needs: build-contributor
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/contrib-digests
          pattern: contrib-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract git metadata
        id: meta
        run: |
          echo "git_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create contributor manifest list and push
        working-directory: /tmp/contrib-digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/kubestellar/hive-contributor:v2-latest \
            -t ghcr.io/kubestellar/hive-contributor:${{ steps.meta.outputs.git_short }} \
            $(printf 'ghcr.io/kubestellar/hive-contributor@sha256:%s ' *)
