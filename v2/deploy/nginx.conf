worker_processes 1;

events {
    worker_connections 256;
}

http {
    upstream hive_api {
        server hive:3002;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Compress JSON API responses (70-90% reduction)
    gzip on;
    gzip_types application/json text/plain text/event-stream;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;

    server {
        listen 3001;

        location /api/ {
            proxy_pass http://hive_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_hide_header Cache-Control;
            proxy_hide_header Pragma;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;

            proxy_intercept_errors on;
            error_page 502 503 504 =503 @api_error;
        }

        location @api_error {
            default_type application/json;
            return 503 '{"error":"service starting up, please retry","ok":false}';
        }

        location / {
            proxy_pass http://hive_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_hide_header Cache-Control;
            proxy_hide_header Pragma;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }
    }
}

stream {
    upstream hive_ttyd {
        server hive:7681;
    }

    server {
        listen 7681;
        proxy_pass hive_ttyd;
    }
}
