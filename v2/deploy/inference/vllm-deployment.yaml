---
apiVersion: v1
kind: Namespace
metadata:
  name: hive-inference
---
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: hive-inference
type: Opaque
stringData:
  token: "placeholder"
---
# vLLM-compatible inference backend using llama.cpp server.
# llama.cpp provides the same OpenAI Chat Completions API that vLLM does,
# but runs natively on ARM64 CPU without CUDA dependencies.
# The proxy translation layer (Anthropic <-> OpenAI) works identically.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: hive-inference
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      initContainers:
        - name: model-download
          image: curlimages/curl:8.13.0
          command:
            - /bin/sh
            - -c
            - |
              echo "[model-download] Downloading Qwen2.5-0.5B-Instruct GGUF..."
              curl -L -o /models/qwen2.5-0.5b-instruct-q4_k_m.gguf \
                "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf"
              ls -lh /models/
              echo "[model-download] Done."
          volumeMounts:
            - name: models
              mountPath: /models
      containers:
        - name: llama-server
          image: ghcr.io/ggml-org/llama.cpp:server
          args:
            - "--model"
            - "/models/qwen2.5-0.5b-instruct-q4_k_m.gguf"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--ctx-size"
            - "8192"
            - "--threads"
            - "2"
            - "--chat-template"
            - "chatml"
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "3"
              memory: 6Gi
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: models
          emptyDir:
            sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-svc
  namespace: hive-inference
  labels:
    app: vllm
spec:
  selector:
    app: vllm
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
