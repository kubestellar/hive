level: 2
name: Instructed
description: >
  One-way feedback. Five agents (supervisor, scanner, quality, guide, brainstorm)
  produce advisory beads — findings visible on the dashboard and in a tracking
  issue. No GitHub issues or PRs created. Agents observe and report; humans
  decide what to act on.
governor:
  modes: SURGE, BUSY, QUIET, IDLE
  merge_policy: manual
  eval_interval_s: 600
  cadences:
    surge:
      supervisor: 5m
      guide: 4h
      scanner: 4h
      quality: 6h
    busy:
      supervisor: 5m
      guide: 4h
      scanner: 4h
      quality: 6h
    quiet:
      supervisor: 5m
      guide: 4h
      scanner: 4h
      quality: 6h
    idle:
      supervisor: 5m
      guide: 4h
      scanner: 4h
      quality: 6h
agents:
  - name: supervisor
    display_name: Supervisor
    role: supervisor
    description: >
      Agent health monitoring, sweep analysis, and escalation. Watches all
      other agents for stalls, rate limits, and anomalies.
    emoji: "👑"
    color: "#e74c3c"
    sort_order: 1
    backend: copilot
    model: claude-sonnet-4-6
    bead_role: supervisor
    mode: NO_GITHUB
    kick_template: supervisor-nogithub.md
    include_repos: true
    stale_timeout: 1800
    interactions: >
      Monitors all agents. Escalates issues to human operators. Coordinates
      agent restarts and health checks.
    knowledge_use: >
      Reads agent health history and operational patterns. Produces sweep
      reports and health assessments.
  - name: guide
    display_name: guide (advisory)
    role: guide
    description: >
      Audits project documentation and onboarding experience. At L2, reports
      findings to the advisory issue — does NOT create PRs or push code.
    emoji: "🧭"
    color: "#8e44ad"
    sort_order: 10
    backend: copilot
    model: claude-sonnet-4-6
    bead_role: worker
    mode: ADVISORY
    kick_template: guide-advisory.md
    include_repos: true
    stale_timeout: 3600
    interactions: "Works alongside scanner. Reviews scanner's suggestions when asked."
    knowledge_use: >
      Reads community wiki and project patterns. Starts contributing review
      insights as knowledge entries.
  - name: scanner
    display_name: scanner (advisory)
    role: scanner
    description: >
      Scans code for issues and suggests fixes, but does NOT create PRs or
      issues. Reports findings to the user for manual action.
    emoji: "🔍"
    color: "#3498db"
    sort_order: 20
    backend: copilot
    model: claude-sonnet-4-6
    bead_role: worker
    mode: ADVISORY
    kick_template: scanner-advisory.md
    include_repos: true
    stale_timeout: 7200
    lane_keywords: [bug, triage, fix]
    interactions: "Produces findings that guide can review. No autonomous actions."
    knowledge_use: >
      Reads project patterns and known issues. Produces findings as knowledge
      entries for the team to review.
  - name: quality
    display_name: quality (advisory)
    role: quality
    description: >
      Analyzes test coverage gaps and suggests test strategies. At L2, reports
      findings to the advisory issue — does NOT create PRs or push code.
    emoji: "🧪"
    color: "#e67e22"
    sort_order: 25
    backend: copilot
    model: claude-sonnet-4-6
    bead_role: worker
    mode: ADVISORY
    kick_template: quality-advisory.md
    include_repos: true
    stale_timeout: 7200
    interactions: "Complements scanner findings with targeted tests. Guide reviews test quality."
    knowledge_use: >
      Reads test patterns, coverage rules, and known regressions from the
      knowledge base to prioritize which code needs tests most.
  - name: brainstorm
    display_name: brainstorm
    role: brainstorm
    description: >
      Ongoing ideation agent. Proposes features, architecture improvements,
      and strategic directions based on project patterns and community KB.
      Produces KB facts and advisory beads.
    emoji: "💡"
    color: "#f39c12"
    sort_order: 30
    backend: copilot
    model: claude-sonnet-4-6
    bead_role: worker
    mode: ADVISORY
    kick_template: brainstorm-advisory.md
    include_repos: true
    stale_timeout: 7200
    interactions: "Standalone. Produces ideation beads for human review."
    knowledge_use: >
      Heavy consumer of community wiki patterns. Produces ideation facts
      (feature proposals, architecture decisions, strategic direction) into
      the project KB layer.
