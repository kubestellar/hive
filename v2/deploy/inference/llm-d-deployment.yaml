---
# llm-d EPP (Endpoint Picker Policy) deployment.
#
# Prerequisites (applied separately before this manifest):
#   1. Gateway API CRDs v1.2+:
#      kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml
#   2. Gateway API Inference Extension CRDs v1.5.0:
#      kubectl apply --server-side -f https://github.com/kubernetes-sigs/gateway-api-inference-extension/releases/download/v1.5.0/manifests.yaml
#   3. vLLM deployment running in hive-inference namespace

---
# InferencePool (GA v1): targets vLLM pods by label, with EPP as endpoint picker
apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: hive-vllm-pool
  namespace: hive-inference
spec:
  targetPorts:
    - number: 8000
  selector:
    matchLabels:
      app: vllm
  endpointPickerRef:
    name: llm-d-epp
    port:
      number: 9002

---
# InferenceModel (v1alpha2): maps model name to pool
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceModel
metadata:
  name: qwen-0-5b
  namespace: hive-inference
spec:
  modelName: "qwen2.5-0.5b-instruct"
  poolRef:
    name: hive-vllm-pool
  criticality: Standard

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-d-epp
  namespace: hive-inference

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llm-d-epp
rules:
  - apiGroups: ["inference.networking.k8s.io"]
    resources: ["inferencepools"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["inference.networking.x-k8s.io"]
    resources: ["inferencepools", "inferencemodels", "inferencemodelrewrites", "inferenceobjectives", "inferencepoolimports"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["endpoints", "services"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llm-d-epp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: llm-d-epp
subjects:
  - kind: ServiceAccount
    name: llm-d-epp
    namespace: hive-inference

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-epp
  namespace: hive-inference
  labels:
    app: llm-d-epp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-d-epp
  template:
    metadata:
      labels:
        app: llm-d-epp
    spec:
      serviceAccountName: llm-d-epp
      containers:
        - name: epp
          image: ghcr.io/llm-d/llm-d-inference-scheduler:latest
          args:
            - "--pool-name=hive-vllm-pool"
            - "--pool-namespace=hive-inference"
            - "--secure-serving=false"
          ports:
            - containerPort: 9002
              name: grpc
              protocol: TCP
            - containerPort: 9003
              name: health
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: 256Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          readinessProbe:
            grpc:
              port: 9003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 9003
            initialDelaySeconds: 10
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: llm-d-epp
  namespace: hive-inference
  labels:
    app: llm-d-epp
spec:
  selector:
    app: llm-d-epp
  ports:
    - port: 9002
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: 9003
      targetPort: health
      protocol: TCP
      name: health
  type: ClusterIP
